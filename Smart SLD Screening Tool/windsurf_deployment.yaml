# Windsurf Deployment Configuration
name: smart-sld-screening
framework: static
build:
  command: ""
  publish: "."
routes:
  - path: "/*"
    static: true
    headers:
      - key: "Cache-Control"
        value: "public, max-age=3600"
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "X-XSS-Protection"
        value: "1; mode=block"

# Environment variables (add any required environment variables here)
env:
  NODE_ENV: production
